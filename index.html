<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Guide Application</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>AI Travel Guide Application</h1>
    <div>
        <h2>Setup</h2>
        <form id="setupForm">
            <label for="destination">Destination:</label>
            <input type="text" id="destination" required>
            <button type="submit">Get Guide</button>
        </form>
    </div>
    <div id="guide" style="display: none;">
        <h2>Your Travel Guide</h2>
        <div id="guideContent"></div>
    </div>
    <script>
        document.getElementById('setupForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const destination = document.getElementById('destination').value;
            analyzeDestination(destination);
        });

        function analyzeDestination(destination) {
            axios.post('https://api.huggingface.co/analyze', {
                destination: destination
            }, {
                headers: {
                    'Authorization': 'Bearer YOUR_HUGGING_FACE_API_TOKEN'
                }
            })
            .then(function (response) {
                document.getElementById('guideContent').innerHTML = response.data.guide;
                document.getElementById('guide').style.display = 'block';
            })
            .catch(function (error) {
                console.error('Error fetching the travel guide:', error);
            });
        }
    </script>
</body>
</html>
